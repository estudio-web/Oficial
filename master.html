<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Panel — ARG STORE</title>

<link rel="stylesheet" href="admin-styles.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
.hidden { display: none !important; }

.nav-item.active {
  background: var(--orange, #FF6B00);
  color:#000;
}

.section { margin-top: 20px; }

.filters {
  display:flex;
  gap:10px;
  margin:10px 0;
  flex-wrap:wrap;
}

.filters input,
.filters select {
  padding:8px;
  border-radius:6px;
  border:none;
}

.order-row {
  border-bottom:1px solid #333;
  padding:10px;
}

.stat-card div:last-child {
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>👑 MASTER PANEL</h2>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item active" data-tab="dashboard">📊 Dashboard</button>
    <button class="nav-item" data-tab="usuarios">👥 Usuarios</button>
    <button class="nav-item" data-tab="pedidos-global">📋 Pedidos</button>
    <button class="nav-item" data-tab="configuracion">⚙️ Config</button>
  </nav>

  <div class="sidebar-footer">
    <button id="logoutAdmin" class="btn-logout">🚪 Cerrar sesión</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main-content">

  <!-- HEADER -->
  <header class="admin-header">
    <h1 id="pageTitle">Dashboard Global</h1>
    <div class="header-right">
      <span id="userName">Admin</span>
      <button id="toggleSidebar">☰</button>
    </div>
    
  </header>

  <!-- CONTENIDO -->
  <div class="container">

    <!-- DASHBOARD -->
    <div class="tab-content" id="dashboard-tab">

      <div class="stats-grid">
        <div class="stat-card">
          <div>👥</div>
          <div>Vendedores</div>
          <div id="totalVendedores">0</div>
        </div>

        <div class="stat-card">
          <div>💰</div>
          <div>Ingresos</div>
          <div id="totalIngresosGlobal">$0</div>
        </div>

        <div class="stat-card">
          <div>📊</div>
          <div>Ventas</div>
          <div id="totalVentasGlobal">0</div>
        </div>

        <div class="stat-card">
          <div>💎</div>
          <div>Diamantes</div>
          <div id="totalDiamantes">0</div>
        </div>
      </div>

      <div class="section">
        <h2>🏆 Top Vendedores</h2>
        <div id="topVendedoresList"></div>
      </div>

    </div>

    <!-- USUARIOS -->
    <div class="tab-content hidden" id="usuarios-tab">

      <h2>👥 Gestión de Usuarios</h2>

      <div class="filters">
        <select id="filterUserStatus">
          <option value="">Todos</option>
          <option value="activo">Activos</option>
          <option value="suspendido">Suspendidos</option>
        </select>
      </div>

      <div id="usuariosList"></div>

    </div>

    <!-- PEDIDOS -->
    <div class="tab-content hidden" id="pedidos-global-tab">

      <h2>📋 Pedidos Globales</h2>

      <div class="filters">
        <select id="filterOrderStatus">
          <option value="">Todos</option>
          <option value="pendiente">Pendiente</option>
          <option value="pagado">Pagado</option>
          <option value="entregado">Entregado</option>
          <option value="cancelado">Cancelado</option>
        </select>

        <select id="filterUserOrders">
          <option value="">Todos los vendedores</option>
        </select>
      </div>

      <div id="pedidosGlobalList"></div>

    </div>

    <!-- CONFIG -->
    <div class="tab-content hidden" id="configuracion-tab">

      <h2>⚙️ Configuración Global</h2>

      <div class="filters">
        <input type="number" id="comisionGlobal" placeholder="Comisión %">
        <input type="number" id="limiteFree" placeholder="Límite free">
      </div>

      <textarea id="maintenanceMsg" placeholder="Mensaje global"></textarea>

      <br><br>
      <button id="saveGlobalConfig">Guardar Configuración</button>

      <hr>

      <!-- 🔥 NUEVO SISTEMA UID -->
      <h2>🔗 Vincular Usuario (Auth → Firestore)</h2>

      <div class="filters">
        <input id="newUserUID" placeholder="UID (Firebase Auth)">
        <input id="newAdminEmail" placeholder="Email">
        <input id="newAdminTienda" placeholder="Nombre tienda">
        <input id="newTelefono" placeholder="WhatsApp">
      </div>

      <div class="filters">
        <input type="color" id="newColor" value="#FF6B00">

        <select id="newPlan">
          <option value="free">Free</option>
          <option value="pro">Pro</option>
          <option value="master">Master</option>
        </select>

        <input type="number" id="newDuracion" placeholder="Duración días (30)">
      </div>

      <button id="createUserFirestore">Crear / Vincular Usuario</button>

      <h2>📣 Enviar Notificación Global</h2>

<input id="pushTitle" placeholder="Título">
<input id="pushBody" placeholder="Mensaje">

<button id="sendPush">Enviar Push</button>
    </div>
    
  </div>

  

</main>

<!-- FIREBASE -->
<script type="module" src="master-script.js"></script>

<!-- TABS -->
<script>
document.querySelectorAll(".nav-item").forEach(btn => {
  btn.addEventListener("click", () => {

    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const tab = btn.dataset.tab;

    document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
    document.getElementById(tab + "-tab").classList.remove("hidden");

    const titles = {
      dashboard: "Dashboard Global",
      usuarios: "Usuarios",
      "pedidos-global": "Pedidos Globales",
      configuracion: "Configuración"
    };

    document.getElementById("pageTitle").textContent = titles[tab];
  });
});



</script>

</body>
</html>
