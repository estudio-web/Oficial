<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Panel — ARG STORE</title>

<link rel="stylesheet" href="admin-styles.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
.hidden { display: none !important; }

body {
  margin:0;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#111;
  color:white;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  transition: transform 0.3s ease;
  z-index:1000;
}

.sidebar.closed {
  transform: translateX(-100%);
}

/* MAIN */
.main-content {
  margin-left:260px;
  width:100%;
  transition: margin 0.3s ease;
}

.main-content.full {
  margin-left:0;
}

/* HEADER */
.admin-header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#000;
  color:white;
}

/* OVERLAY */
.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:999;
  display:none;
}

.overlay.active {
  display:block;
}

/* MOBILE */
@media(max-width: 768px){

  .sidebar {
    transform: translateX(-100%);
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .main-content {
    margin-left:0;
  }
}

/* BOTÓN */
#toggleSidebar {
  font-size:22px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay" class="overlay"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>👑 MASTER PANEL</h2>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item active" data-tab="dashboard">📊 Dashboard</button>
    <button class="nav-item" data-tab="usuarios">👥 Usuarios</button>
    <button class="nav-item" data-tab="pedidos-global">📋 Pedidos</button>
    <button class="nav-item" data-tab="configuracion">⚙️ Config</button>
  </nav>

  <div class="sidebar-footer">
    <button id="logoutAdmin" class="btn-logout">🚪 Cerrar sesión</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main-content" id="mainContent">

<header class="admin-header">
  <h1 id="pageTitle">Dashboard Global</h1>

  <div>
    <span id="userName">Admin</span>
    <button id="toggleSidebar">☰</button>
  </div>
</header>

<div class="container">

  <!-- DASHBOARD -->
  <div class="tab-content" id="dashboard-tab">
    <div class="stats-grid">
      <div class="stat-card">
        <div>👥</div>
        <div>Vendedores</div>
        <div id="totalVendedores">0</div>
      </div>
    </div>
  </div>

  <!-- USUARIOS -->
  <div class="tab-content hidden" id="usuarios-tab">
    <h2>Usuarios</h2>
    <div id="usuariosList"></div>
  </div>

  <!-- PEDIDOS -->
  <div class="tab-content hidden" id="pedidos-global-tab">
    <h2>Pedidos</h2>
    <div id="pedidosGlobalList"></div>
  </div>

  <!-- CONFIG -->
  <div class="tab-content hidden" id="configuracion-tab">
    <h2>Configuración</h2>

    <input id="pushTitle" placeholder="Título">
    <input id="pushBody" placeholder="Mensaje">

    <button id="sendPush">Enviar</button>
  </div>

</div>
</main>

<script type="module" src="master-script.js"></script>

<!-- 🔥 SCRIPT UI -->
<script>
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleSidebar");
const overlay = document.getElementById("overlay");

toggleBtn.addEventListener("click", () => {
  sidebar.classList.toggle("open");
  overlay.classList.toggle("active");
});

overlay.addEventListener("click", () => {
  sidebar.classList.remove("open");
  overlay.classList.remove("active");
});

// TABS
document.querySelectorAll(".nav-item").forEach(btn => {
  btn.addEventListener("click", () => {

    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const tab = btn.dataset.tab;

    document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
    document.getElementById(tab + "-tab").classList.remove("hidden");

    // cerrar sidebar en mobile
    sidebar.classList.remove("open");
    overlay.classList.remove("active");

  });
});
</script>

</body>
</html>
