<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ARG STORE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: linear-gradient(135deg, #050508 0%, #0A0A0F 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #E8E8F0;
}

.login-container {
  background: #0F0F18;
  border: 1px solid rgba(255, 107, 0, 0.2);
  border-radius: 12px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
}

.login-header {
  text-align: center;
  margin-bottom: 30px;
}

.login-header h1 {
  font-family: 'Orbitron', monospace;
  font-size: 32px;
  color: #FF6B00;
  margin-bottom: 10px;
}

.login-header p {
  font-size: 14px;
  color: rgba(232, 232, 240, 0.6);
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 500;
}

.form-group input {
  width: 100%;
  padding: 12px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 107, 0, 0.2);
  border-radius: 6px;
  color: #E8E8F0;
  font-family: 'Rajdhani', sans-serif;
  transition: all 0.3s;
  outline: none;
}

.form-group input:focus {
  border-color: #FF6B00;
  box-shadow: 0 0 10px rgba(255, 107, 0, 0.2);
  background: rgba(255, 255, 255, 0.08);
}

.btn-login {
  width: 100%;
  padding: 12px;
  background: #FF6B00;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Rajdhani', sans-serif;
  margin-top: 10px;
}

.btn-login:hover {
  background: #FF8C00;
  box-shadow: 0 0 20px rgba(255, 107, 0, 0.4);
}

.btn-login:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.error-msg {
  background: rgba(244, 67, 54, 0.2);
  border: 1px solid #f44336;
  color: #ffcdd2;
  padding: 12px;
  border-radius: 6px;
  margin-bottom: 20px;
  font-size: 13px;
  display: none;
}

.success-msg {
  background: rgba(76, 175, 80, 0.2);
  border: 1px solid #4CAF50;
  color: #c8e6c9;
  padding: 12px;
  border-radius: 6px;
  margin-bottom: 20px;
  font-size: 13px;
  display: none;
}

.divider {
  text-align: center;
  margin: 25px 0;
  font-size: 12px;
  color: rgba(232, 232, 240, 0.4);
}

.register-btn {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: #FF6B00;
  border: 1px solid rgba(255, 107, 0, 0.4);
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Rajdhani', sans-serif;
}

.register-btn:hover {
  border-color: #FF6B00;
  background: rgba(255, 107, 0, 0.1);
}

.login-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: rgba(232, 232, 240, 0.5);
}

.back-store {
  text-align: center;
  margin-top: 15px;
}

.back-store a {
  color: #FF6B00;
  text-decoration: none;
  font-size: 13px;
  transition: all 0.3s;
}

.back-store a:hover {
  text-decoration: underline;
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media (max-width: 480px) {
  .login-container {
    padding: 30px 20px;
  }
  
  .login-header h1 {
    font-size: 28px;
  }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <h1>🎮 ARG STORE</h1>
    <p>Panel de Control</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <form id="loginForm">
    <div class="form-group">
      <label>📧 Email</label>
      <input type="email" id="email" required placeholder="tu@email.com">
    </div>

    <div class="form-group">
      <label>🔐 Contraseña</label>
      <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
    </div>

    <button type="submit" class="btn-login" id="loginBtn">Ingresar</button>
  </form>

  <div class="divider">— o —</div>

  <button class="register-btn" id="registerToggle">Crear nueva cuenta</button>

  <!-- FORM REGISTRO (OCULTO) -->
  <form id="registerForm" style="display: none;">
    <div class="form-group">
      <label>📧 Email</label>
      <input type="email" id="regEmail" required placeholder="tu@email.com">
    </div>

    <div class="form-group">
      <label>🔐 Contraseña</label>
      <input type="password" id="regPassword" required placeholder="Mínimo 6 caracteres">
    </div>

    <div class="form-group">
      <label>🏪 Nombre de Tienda</label>
      <input type="text" id="regTienda" required placeholder="Mi Tienda">
    </div>

    <div class="form-group">
      <label>📱 Teléfono WhatsApp</label>
      <input type="tel" id="regPhone" required placeholder="5492646706973">
    </div>

    <button type="submit" class="btn-login" id="registerBtn">Registrarse</button>
    <button type="button" class="register-btn" id="backToLogin" style="margin-top: 10px;">Volver a login</button>
  </form>

  <div class="login-footer">
    <p></p>
  </div>

  <div class="back-store">
    <a href="index.html">← Volver a la tienda</a>
  </div>
</div>

<!-- FIREBASE SCRIPTS -->
<!-- 🔥 SOLO ESTO -->
<script type="module">

import { FirebaseServices } from "./firebase-services.js";
import { auth } from "./firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ELEMENTOS
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");
const registerToggle = document.getElementById("registerToggle");
const backToLogin = document.getElementById("backToLogin");
const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");
const errorMsg = document.getElementById("errorMsg");
const successMsg = document.getElementById("successMsg");

// TOGGLE
registerToggle.addEventListener("click", () => {
  loginForm.style.display = "none";
  registerForm.style.display = "block";
  errorMsg.style.display = "none";
  successMsg.style.display = "none";
});

backToLogin.addEventListener("click", () => {
  loginForm.style.display = "block";
  registerForm.style.display = "none";
  errorMsg.style.display = "none";
  successMsg.style.display = "none";
  loginForm.reset();
});

// LOGIN
loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="spinner"></span>Ingresando...';
  errorMsg.style.display = "none";

  const result = await FirebaseServices.Auth.loginWithEmail(email, password);

  if (result.success) {
    successMsg.textContent = "✓ Inicio de sesión exitoso";
    successMsg.style.display = "block";

    setTimeout(() => {
      window.location.href = "master.html";
    }, 1200);

  } else {
    errorMsg.textContent = "❌ " + result.error;
    errorMsg.style.display = "block";
    loginBtn.disabled = false;
    loginBtn.innerHTML = "Ingresar";
  }
});

// REGISTRO
registerForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPassword").value;
  const tienda = document.getElementById("regTienda").value;
  const telefono = document.getElementById("regPhone").value;

  if (password.length < 6) {
    errorMsg.textContent = "⚠️ Mínimo 6 caracteres";
    errorMsg.style.display = "block";
    return;
  }

  registerBtn.disabled = true;
  registerBtn.innerHTML = '<span class="spinner"></span>Creando...';

  const authResult = await FirebaseServices.Auth.createUser(email, password);

  if (authResult.success) {

    const profile = await FirebaseServices.User.createUserProfile(authResult.uid, {
      nombre: tienda,
      email,
      telefono,
      nombreTienda: tienda,
      plan: "free"
    });

    if (profile.success) {
      successMsg.textContent = "✓ Cuenta creada correctamente";
      successMsg.style.display = "block";

      setTimeout(() => {
        window.location.href = "master.html";
      }, 1200);

    } else {
      errorMsg.textContent = "Error creando perfil";
      errorMsg.style.display = "block";
    }

  } else {
    errorMsg.textContent = authResult.error;
    errorMsg.style.display = "block";
  }

  registerBtn.disabled = false;
  registerBtn.innerHTML = "Registrarse";
});

// AUTO LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "master.html";
  }
});

</script>

</body>
</html>
